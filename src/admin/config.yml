backend:
  name: git-gateway
  branch: main

media_folder: "src/uploads" # Imagens do blog ficarão aqui
public_folder: "uploads" # URL das imagens chamará esta pasta

collections:
  - name: "blog"
    label: "Artigos do Blog"
    folder: "src/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Layout Oculto", name: "layout", widget: "hidden", default: "blog.njk"}
      - {label: "Título do Artigo", name: "title", widget: "string"}
      - {label: "Resumo para o Google (SEO)", name: "description", widget: "string"}
      - {label: "Data de Publicação", name: "date", widget: "datetime"}
      - {label: "Texto do Artigo", name: "body", widget: "markdown"}

  - name: "pacotes_aereos"
    label: "✈️ Pacotes Aéreos"
    folder: "src/pacotes/aereos"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Layout Oculto", name: "layout", widget: "hidden", default: "pacote.njk"}
      - {label: "Título do Pacote", name: "title", widget: "string"}
      - {label: "Imagem de Destaque", name: "image", widget: "image"}
      - {label: "Selo Promocional (Badge)", name: "badge", widget: "object", fields: [
          {label: "Texto (ex: Mais Vendido)", name: "text", widget: "string", required: false},
          {label: "Cor do Selo", name: "color", widget: "select", options: ["Azul", "Laranja", "Verde", "Vermelho"], default: "Laranja"}
      ]}
      - {label: "Data da Viagem (Texto)", name: "date_range", widget: "string", hint: "Ex: 12 a 18 Nov 2026"}
      - {label: "Data de Início (Para o Calendário)", name: "start_date", widget: "datetime", required: false}
      - {label: "Duração", name: "duration", widget: "string", hint: "Ex: 7 Dias"}
      - {label: "Destino", name: "location", widget: "string", hint: "Ex: Fortaleza, CE"}
      - {label: "Preço (apenas número)", name: "price", widget: "string", hint: "Ex: 2.490"}
      - {label: "Condição de Preço", name: "price_cond", widget: "string", default: "por pessoa | Em até 10x sem juros"}
      - {label: "Link Personalizado (Opcional)", name: "link", widget: "string", required: false, hint: "Deixe em branco para usar o WhatsApp padrão"}
      - label: "📸 Galeria de Imagens (Adicione quantas quiser)"
        name: "gallery"
        widget: "list"
        required: false
        summary: "{{fields.image}}"
        field: { label: "Imagem", name: "image", widget: "image" }
      - {label: "Descrição/Itinerário Detalhado", name: "body", widget: "markdown", required: false}

  - name: "pacotes_rodoviarios"
    label: "🚌 Pacotes Rodoviários"
    folder: "src/pacotes/rodoviarios"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Layout Oculto", name: "layout", widget: "hidden", default: "pacote.njk"}
      - {label: "Título do Pacote", name: "title", widget: "string"}
      - {label: "Selo de Categoria (ex: Nacional, Internacional)", name: "category", widget: "string", default: "Nacional"}
      - {label: "Imagem de Destaque PRINCIPAL", name: "image", widget: "image"}
      - label: "📸 Galeria de Imagens (Adicione quantas quiser)"
        name: "gallery"
        widget: "list"
        required: false
        summary: "{{fields.image}}"
        field: { label: "Imagem", name: "image", widget: "image" }
      - {label: "Selo do Card (ex: Promoção)", name: "badge", widget: "object", fields: [
          {label: "Texto", name: "text", widget: "string"},
          {label: "Cor", name: "color", widget: "select", options: ["Laranja", "Azul", "Verde"]}
        ]}
      - {label: "📅 Datas", name: "dates", widget: "object", fields: [
          {label: "Data de Saída", name: "departure", widget: "datetime", format: "DD/MM/YYYY"},
          {label: "Data de Retorno", name: "return", widget: "datetime", format: "DD/MM/YYYY"},
          {label: "Texto livre da data (ex: 10 a 14 Mai)", name: "display", widget: "string"}
        ]}
      - {label: "Duração (ex: 5 Dias)", name: "duration", widget: "string"}
      - {label: "Localização (ex: Rio de Janeiro, RJ)", name: "location", widget: "string"}
      - {label: "💰 Preço (A partir de)", name: "price", widget: "string"}
      - {label: "Condição (ex: em até 10x sem juros)", name: "price_cond", widget: "string"}
      - {label: "Link Personalizado", name: "link", widget: "string", required: false}
      - {label: "📝 Roteiro Detalhado (Dia a Dia)", name: "body", widget: "markdown"}

  - name: "cruzeiros"
    label: "🚢 Cruzeiros"
    folder: "src/pacotes/cruzeiros"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Layout Oculto", name: "layout", widget: "hidden", default: "pacote.njk"}
      - {label: "Título do Cruzeiro", name: "title", widget: "string"}
      - {label: "Imagem de Destaque", name: "image", widget: "image"}
      - {label: "Selo Promocional (Badge)", name: "badge", widget: "object", fields: [
          {label: "Texto", name: "text", widget: "string", required: false},
          {label: "Cor do Selo", name: "color", widget: "select", options: ["Azul", "Laranja", "Verde", "Vermelho", "Navio"], default: "Navio"}
      ]}
      - {label: "Data da Viagem (Texto)", name: "date_range", widget: "string", required: false}
      - {label: "Data de Início (Para o Calendário)", name: "start_date", widget: "datetime", required: false}
      - {label: "Itinerário", name: "itinerary", widget: "string", hint: "Ex: Santos, Búzios, Ilhabela"}
      - {label: "Duração", name: "duration", widget: "string", hint: "Ex: 4 Noites"}
      - {label: "Preço (apenas número)", name: "price", widget: "string"}
      - {label: "Condição de Preço", name: "price_cond", widget: "string", default: "por pessoa | Entrada + 12x sem juros"}
      - {label: "Link Personalizado", name: "link", widget: "string", required: false}
      - label: "📸 Galeria de Imagens (Adicione quantas quiser)"
        name: "gallery"
        widget: "list"
        required: false
        summary: "{{fields.image}}"
        field: { label: "Imagem", name: "image", widget: "image" }
      - {label: "Descrição Detalhada", name: "body", widget: "markdown", required: false}

  - name: "settings"
    label: "⚙️ Configurações do Site"
    files:
      - label: "Tags do Google (GTM / Analytics)"
        name: "google_tags"
        file: "src/_data/settings.json"
        fields:
          - label: "Código do Google Tag Manager (GTM)"
            name: "gtm_id"
            widget: "string"
            required: false
            hint: "Cole aqui o ID do GTM. Exemplo: GTM-XXXXXXX"
          - label: "Tag do Google Search Console"
            name: "google_verification"
            widget: "string"
            required: false
            hint: "Cole aqui o código de verificação do Search Console"
          - label: "ID do Google Analytics (GA4)"
            name: "google_analytics_id"
            widget: "string"
            required: false
            hint: "Cole aqui o ID do GA4. Exemplo: G-XXXXXXXXXX"
